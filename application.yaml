apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-api 
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kims242/gitops  # N'oublie pas de changer ça !
    targetRevision: HEAD
    path: apps/todo-api
  destination:
    server: https://kubernetes.default.svc
    namespace: todo-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true